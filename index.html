<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drive Wise</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
<div class="app">

  <div class="header">
    <span class="drive">Drive</span>
    <span class="wise">Wise</span>
  </div>

  <iframe 
    id="mapa"
    src="https://www.google.com/maps?q=Fortaleza&output=embed">
  </iframe>

  <div class="painel">
    <div class="handle"></div>

    <input type="text" id="origem" placeholder="De onde você quer ir?">
    <input type="text" id="destino" placeholder="Para onde você quer ir?">

    <button onclick="gerarRota()">Mostrar rota</button>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
